<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>使用 &lt;th&gt; 添加标题</title>
  <link rel="stylesheet" href="minimal-table.css">
</head>
<body>
  <h1>使用 &lt;th&gt; 元素添加标题</h1>
  <table>
    <tr>
      <th scope="col">&nbsp;</th>
      <th scope="col">诺基</th>
      <th scope="col">弗洛尔</th>
      <th scope="col">艾拉</th>
      <th scope="col">胡安</th>
    </tr>
    <tr>
      <th scope="row">品种</th>
      <td>杰克罗斯犬</td>
      <td>贵宾犬</td>
      <td>流浪犬</td>
      <td>可卡犬</td>
    </tr>
    <tr>
      <th scope="row">年龄</th>
      <td>16</td>
      <td>9</td>
      <td>10</td>
      <td>5</td>
    </tr>
    <tr>
      <th scope="row">主人</th>
      <td>岳母</td>
      <td>我</td>
      <td>我</td>
      <td>嫂子</td>
    </tr>
    <tr>
      <th scope="row">饮食习惯</th>
      <td>吃掉所有人的剩菜</td>
      <td>啃咬食物</td>
      <td>吃得多</td>
      <td>吃到爆炸为止</td>
    </tr>
  </table>
</body>
</html>
