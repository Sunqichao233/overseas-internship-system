<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>使用 &lt;col&gt; 统一样式</title>
  <link rel="stylesheet" href="minimal-table.css">
</head>
<body>
  <h1>&lt;colgroup&gt; / &lt;col&gt; 统一列样式</h1>

<table>
  <colgroup>
    <col />
    <col style="background-color: yellow" />
  </colgroup>
  <tr>
    <th>数据 1</th>
    <th>数据 2</th>
  </tr>
  <tr>
    <td>加尔各答</td>
    <td>橙汁</td>
  </tr>
  <tr>
    <td>机器人</td>
    <td>爵士乐</td>
  </tr>
</table>
</body>
</html>
