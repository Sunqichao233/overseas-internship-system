<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>使用 &lt;caption&gt; 添加表格标题</title>
  <link rel="stylesheet" href="minimal-table.css">
</head>
<body>
  <h1>为表格添加可见标题</h1>

  <table>
    <caption>本周宠物体检预约</caption>
    <tr>
      <th scope="col">姓名</th>
      <th scope="col">品种</th>
      <th scope="col">预约日期</th>
    </tr>
    <tr>
      <td>诺基</td>
      <td>杰克罗素</td>
      <td>周一</td>
    </tr>
    <tr>
      <td>弗洛尔</td>
      <td>贵宾犬</td>
      <td>周二</td>
    </tr>
    <tr>
      <td>艾拉</td>
      <td>流浪犬</td>
      <td>周三</td>
    </tr>
  </table>
</body>
</html>
