<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>题目：变更文字颜色（答案）</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      font-family: "Microsoft YaHei", sans-serif;
    }
    .card {
      width: 420px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #1f2937;
    }
    p {
      margin: 0 0 14px;
      font-size: 18px;
      color: #374151;
      line-height: 1.7;
    }
    #colorInfo {
      margin-bottom: 12px;
      font-weight: 700;
    }
    #textColorPicker {
      width: 100%;
      height: 42px;
      border: none;
      background: transparent;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">萌萌小店公告</h1>
    <p id="desc">请使用颜色选择器来改变这段文字和标题的颜色。</p>
    <div id="colorInfo">当前文字颜色：#1f2937</div>
    <input id="textColorPicker" type="color" value="#1f2937">
  </div>

  <script>
    const title = document.querySelector('#title');
    const desc = document.querySelector('#desc');
    const colorInfo = document.querySelector('#colorInfo');
    const textColorPicker = document.querySelector('#textColorPicker');

    function updateTextColor() {
      const value = textColorPicker.value;
      title.style.color = value;
      desc.style.color = value;
      colorInfo.textContent = `当前文字颜色：${value}`;
    }

    textColorPicker.addEventListener('input', updateTextColor);
    updateTextColor();
  </script>
</body>
</html>
