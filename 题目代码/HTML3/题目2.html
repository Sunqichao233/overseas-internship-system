<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程表</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: "Microsoft YaHei", sans-serif;
      background: #fff;
    }
    table {
      width: 740px;
      margin: 0 auto;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 22px;
      text-align: center;
    }
    caption {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    th, td {
      border: 2px solid #444;
      height: 56px;
      vertical-align: middle;
      padding: 0;
    }
    .left-col {
      width: 64px;
      font-weight: 700;
    }
    .weekday {
      width: 96px;
    }
    .group {
      font-size: 44px;
      font-weight: 700;
    }
    .time {
      font-size: 44px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <table>
    <caption>课程表</caption>
    <tr>
      <th class="left-col group">项目</th>
      <th class="group" colspan="5">上课</th>
      <th class="group" colspan="2">活动与休息</th>
    </tr>
    <tr>
      <th class="left-col">星期</th>
      <th class="weekday">星期一</th>
      <th class="weekday">星期二</th>
      <th class="weekday">星期三</th>
      <th class="weekday">星期四</th>
      <th class="weekday">星期五</th>
      <th class="weekday">星期六</th>
      <th class="weekday">星期日</th>
    </tr>

    <tr>
      <td class="left-col time" rowspan="4">上午</td>
      <td>语文</td>
      <td>数学</td>
      <td>英语</td>
      <td>英语</td>
      <td>物理</td>
      <td>数学竞赛</td>
      <td rowspan="4">休息</td>
    </tr>
    <tr>
      <td>数学</td>
      <td>语文</td>
      <td>化学</td>
      <td>物理</td>
      <td>英语</td>
      <td>篮球比赛</td>
    </tr>
    <tr>
      <td>化学</td>
      <td>语文</td>
      <td>体育</td>
      <td>历史</td>
      <td>地理</td>
      <td>每周一考</td>
    </tr>
    <tr>
      <td>体育</td>
      <td>化学</td>
      <td>语文</td>
      <td>数学</td>
      <td>英语</td>
      <td>社会实践</td>
    </tr>

    <tr>
      <td class="left-col time" rowspan="2">下午</td>
      <td>语文</td>
      <td>英语</td>
      <td>数学</td>
      <td>物理</td>
      <td>数学</td>
      <td>英语角</td>
      <td rowspan="2">休息</td>
    </tr>
    <tr>
      <td>化学</td>
      <td>物理</td>
      <td>地理</td>
      <td>生物</td>
      <td>体育</td>
      <td>自由活动</td>
    </tr>
  </table>
</body>
</html>
