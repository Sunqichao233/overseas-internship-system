<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML2 表单题目4</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Microsoft YaHei", sans-serif;
      background: #fff;
      color: #222;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
    }

    .form-wrap {
      max-width: 760px;
      border: 2px solid #666;
      padding: 16px;
      margin: 0 auto;
    }

    .row {
      margin-bottom: 14px;
    }

    label {
      display: inline-block;
      min-width: 120px;
      vertical-align: top;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    input[type="file"],
    select,
    textarea {
      width: 320px;
      padding: 6px 8px;
      border: 1px solid #888;
      font-size: 16px;
    }

    textarea {
      height: 90px;
      resize: vertical;
    }

    .inline {
      margin-right: 14px;
    }

    .btns {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #ccc;
    }

    button {
      padding: 8px 14px;
      font-size: 16px;
      margin-right: 10px;
      border: 1px solid #666;
      background: #f5f5f5;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>题目4：学员信息登记表（表单练习）</h1>
  <p>要求：完成下列表单结构，至少包含文本框、单选框、多选框、下拉框、日期、文件上传、文本域与按钮。</p>

  <div class="form-wrap">
    <form action="#" method="post" enctype="multipart/form-data">
      <div class="row">
        <label for="name">姓名：</label>
        <input id="name" name="name" type="text" placeholder="请输入姓名" required />
      </div>

      <div class="row">
        <label for="phone">手机号：</label>
        <input id="phone" name="phone" type="tel" placeholder="请输入手机号" />
      </div>

      <div class="row">
        <label>性别：</label>
        <label class="inline">
          <input type="radio" name="gender" value="男" checked /> 男</label>
        <label class="inline">
          <input type="radio" name="gender" value="女" /> 女</label>
      </div>

      <div class="row">
        <label>兴趣方向：</label>
        <label class="inline"><input type="checkbox" name="interest" value="HTML" /> HTML</label>
        <label class="inline"><input type="checkbox" name="interest" value="CSS" /> CSS</label>
        <label class="inline"><input type="checkbox" name="interest" value="JavaScript" /> JavaScript</label>
      </div>

      <div class="row">
        <label for="class">班级：</label>
        <select id="class" name="class" required>
          <option value="">请选择班级</option>
          <option value="前端1班">前端1班</option>
          <option value="前端2班">前端2班</option>
          <option value="前端3班">前端3班</option>
        </select>
      </div>

      <div class="row">
        <label for="date">报名日期：</label>
        <input id="date" name="date" type="date" />
      </div>

      <div class="row">
        <label for="avatar">上传头像：</label>
        <input id="avatar" name="avatar" type="file" accept="image/*" />
      </div>

      <div class="row">
        <label for="remark">备注：</label>
        <textarea id="remark" name="remark" placeholder="请输入备注信息"></textarea>
      </div>

      <div class="btns">
        <button type="submit">提交</button>
        <button type="reset">重置</button>
      </div>
    </form>
  </div>
</body>
</html>
