<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录界面练习</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>
    <main class="login-shell">
        <section class="login-panel">
            <div class="brand">
                <div class="brand__icon">
                    <span class="brand__triangle"></span>
                </div>
                <div class="brand__name">SLURALPRIGHT</div>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="field">
                    <label for="identity">Email Or Username</label>
                    <input id="identity" name="identity" type="text" autocomplete="username">
                    <small class="field__error"></small>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password">
                    <small class="field__error"></small>
                </div>

                <button class="button button--primary" type="submit">Sign In</button>

                <div class="form-links">
                    <a href="#">Forgot Password</a>
                    <a href="#">Sign in with company or school</a>
                </div>

                <div class="divider">
                    <span>OR</span>
                </div>

                <button class="button button--ghost" type="button">Create an account</button>

                <p class="form-status" id="formStatus" aria-live="polite"></p>
            </form>

            <footer class="login-footer">
                <p>Copyright © 2018 SluralPright LLC. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">Terms of Use</a>
                    <a href="#">Privacy Policy</a>
                </div>
            </footer>
        </section>

        <section class="hero-panel">
            <div class="hero-panel__overlay"></div>
            <div class="hero-panel__content">
                <h1>Let's create the future together</h1>
                <button class="button button--outline" type="button">Start a FREE 10-day trial</button>
            </div>
            <div class="light-columns" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="sparkles" id="sparkles" aria-hidden="true"></div>
        </section>
    </main>

    <script src="1.js"></script>
</body>
</html>
