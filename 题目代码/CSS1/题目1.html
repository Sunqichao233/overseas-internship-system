<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唐诗赏析</title>
  <style>
    /* 类型选择器 */
    body {
      font-family: "Microsoft YaHei", sans-serif;
      max-width: 760px;
      margin: 24px auto;
      line-height: 1.8;
      color: #1f2937;
    }

    h2 {
      color: #2563eb;
      margin-bottom: 8px;
    }

    p {
      font-size: 18px;
    }

    /* 类选择器 */
    .poem {
      background: #f8fafc;
      border-left: 4px solid #60a5fa;
      padding: 10px 12px;
    }

    .note {
      color: #4b5563;
      font-size: 16px;
    }

    .translation {
      background: #fff7ed;
      border: 1px solid #fdba74;
      padding: 10px 12px;
      border-radius: 6px;
      margin-top: 12px;
    }

    /* ID 选择器 */
    #main-title {
      text-align: center;
      color: #b91c1c;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1 id="main-title">唐诗赏析</h1>
  <h2>静夜思</h2>
  <p><strong>作者：</strong>李白</p>
  <hr>
  <p class="poem">
    床前明<ruby>月<rt>yuè</rt></ruby>光，<br>
    3333
    疑是地上霜。<br>
    举头望明月，<br>
    低头思故乡。
  </p>
  <p class="note"><em>注释：</em>疑：好像。举头：抬头。</p>
  <blockquote class="translation">
    译文：明亮的月光洒在床前，好像地上结了一层霜。抬头望着天上的明月，低头思念远方的家乡。
  </blockquote>
</body>
</html>
