<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS1 题目3</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f3f5f9;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
    }
    thead th {
      background: linear-gradient(90deg, #2563eb, #0ea5e9);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    th, td {
      border: 1px solid #dbe2ea;
      padding: 12px 10px;
      text-align: left;
      vertical-align: middle;
    }
    tbody tr:nth-child(odd) {
      background: #f8fafc;
    }
    tbody tr:hover {
      background: #e0f2fe;
      transition: background 0.2s ease;
    }
    .score {
      font-weight: 700;
      text-align: center;
      width: 80px;
    }
    .excellent { color: #15803d; }
    .good { color: #1d4ed8; }
    .warning { color: #b45309; }
    tfoot td {
      background: #f1f5f9;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>班级作业评分表（样式改造示例）</h1>
    <table>
      <thead>
        <tr>
          <th>姓名</th>
          <th>作业主题</th>
          <th>提交时间</th>
          <th>评语</th>
          <th class="score">得分</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>张三</td>
          <td>语义化页面结构</td>
          <td>2026-03-17 20:31</td>
          <td>结构清晰，命名规范。</td>
          <td class="score excellent">96</td>
        </tr>
        <tr>
          <td>李四</td>
          <td>表格与表单综合</td>
          <td>2026-03-17 21:05</td>
          <td>功能完整，细节可继续优化。</td>
          <td class="score good">88</td>
        </tr>
        <tr>
          <td>王五</td>
          <td>图片与链接练习</td>
          <td>2026-03-18 08:42</td>
          <td>样式基础正确，交互状态较少。</td>
          <td class="score warning">76</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="4">平均分</td>
          <td class="score">86.7</td>
        </tr>
      </tfoot>
    </table>
  </div>
</body>
</html>
