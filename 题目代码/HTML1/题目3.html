  <h1>名句摘录</h1>
  <h2>《论语》节选</h2>
  <p><strong>章节：</strong>学而篇第一</p>
  <hr>

  <p>
    子曰：<q>学而时习之，不亦说乎？</q><br>
    有朋自远方来，不亦乐乎？<br>
    人不知而不愠，不亦君子乎？
  </p>

  <h3>重点词语</h3>
  <p>
    <strong>说</strong>：同“悦”，愉快。<br>
    <em>愠</em>：生气，恼怒。<br>
    君子：品德高尚的人。
  </p>

  <h3>学习札记</h3>
  <blockquote>
    每天复习一点点，长期坚持就会看到明显进步。
  </blockquote>

  <p>
    今日关键词：<mark>坚持</mark>、<mark>复习</mark>、<mark>自省</mark>
  </p>
